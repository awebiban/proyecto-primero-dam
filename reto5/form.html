<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Nueva Tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand mb-0 h1" href="index.html">TaskMaster</a>
            <div class="d-flex text-white align-items-center">
                <span class="me-3">Iván (1DAM)</span>
                <div class="user-avatar">I</div>
            </div>
        </div>
    </nav>

    <div class="d-flex main-container">

        <aside class="sidebar bg-light p-3">
            <h6>NAVEGACIÓN</h6>
            <div class="d-grid gap-2 mb-4">
                <a href="index.html" class="btn btn-primary rounded-pill text-start shadow-sm"
                    style="box-shadow: 0 8px 20px rgba(0,0,0,0.08);"> <--- Listado de Tareas</a>
            </div>
            <h6>CATEGORÍAS</h6>
            <div class="d-grid gap-2 small">
                <button type="button" class="btn btn-outline-primary rounded-pill text-start shadow-sm"
                    style="box-shadow: 0 8px 20px rgba(0,0,0,0.08);">Trabajo</button>
                <button type="button" class="btn btn-outline-success rounded-pill text-start shadow-sm"
                    style="box-shadow: 0 8px 20px rgba(0,0,0,0.08);">Estudios</button>
                <button type="button" class="btn btn-outline-danger rounded-pill text-start shadow-sm"
                    style="box-shadow: 0 8px 20px rgba(0,0,0,0.08);">Hogar</button>
            </div>
        </aside>

        <main class="flex-grow-1 p-4 content-area">
            <div class="row justify-content-center fade-in">
                <div class="col-md-8 col-lg-6 card p-4 shadow-sm">
                    <h3 class="mb-4">Crear Nueva Tarea</h3>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Título de la tarea</label>
                            <input type="text" class="form-control" placeholder="Ej: Corregir error en BD">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" rows="3" placeholder="Detalles adicionales..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Categoría</label>
                                <select class="form-select">
                                    <option>Trabajo</option>
                                    <option>Estudios</option>
                                    <option>Hogar</option>
                                    <option>Personal</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prioridad</label>
                                <select class="form-select">
                                    <option>Baja</option>
                                    <option selected>Media</option>
                                    <option>Alta</option>
                                    <option>Crítica</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-primary w-100">Guardar Tarea</button>
                            <a href="index.html" class="btn btn-outline-secondary w-50">Cancelar</a>
                        </div>
                    </form>

                    <div class="help-btn">?</div>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <small>&copy; 2026 Proyecto TaskMaster - Implementación Reto 5</small>
    </footer>

</body>

</html>
